unbind C-b
set -g prefix C-s

set-option -g default-terminal "screen-256color"

set -g status-bg "#666666"
set -g status-fg "#aaaaaa"
set -g status-left-length 50
set -g status-right '#( )'

# Coarse adjustment (5 or 10 cursor cells per bump) (Resize panes with Ctrl-<keys>, this is generally overwritten by MacOS space-switching).
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Random housekeeping.
set -g base-index 1
set -g renumber-windows on

# New split panes
bind-key - split-pane -v -c '#{pane_current_path}'
bind-key \ split-pane -h -c '#{pane_current_path}'

# New window/tab
bind-key t new-window -c '#{pane_current_path}'

# Source the tmux conf
bind-key s source-file ~/.tmux.conf \; display-message "tmux conf reloaded"

# Background the selected pane to a new tmux tab (I use this right after starting a server, for example)
bind-key b break-pane -d

# Opens a new pane with Vim in CtrlP-mode (to enable an instant fuzzy-search), pane will close once the vim process for this pane closes.
bind-key v split-window -h "vim +CtrlP"

# Opens the tmux conf in a new pane. Pane closes when the vim process is killed.
bind-key T split-window -h "vim ~/.tmux.conf"

set -g mouse on
set -sg escape-time 0

# A full-fledged fuzzy search for named tmux sessions.
bind F split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Tree-like view and previews of active split panes
bind-key j choose-tree

# Prompted join-pane
bind-key , command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Easily swap a pane (targeted by pane number) with the current pane
bind-key < display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"
bind-key n send-keys 'tat && exit' 'C-m'
bind-key K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'

# This puts you in "copy mode" when scrolling terminal output. I don't necessarily recommend this, but I use it for consistency with Vim.
bind-key -Tcopy-mode-vi Escape send -X cancel
bind-key -Tcopy-mode-vi V send -X rectangle-toggle

# This makes it so that a tmux split pane containing Vim split-panes respects the heirarchy of Ctrl-<key> movement.
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
